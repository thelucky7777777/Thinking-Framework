<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ETF 策略模擬器 | 專家導讀版</title>
    <script src="[https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js](https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js)"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 1000px; }
        .main-layout { display: flex; gap: 20px; flex-wrap: wrap; }
        .controls { flex: 1; min-width: 320px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        .chart-container { flex: 1.5; min-width: 350px; height: 400px; position: relative; }
        .control-item { background: #f8f9fa; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        label { display: block; font-weight: bold; color: #455a64; margin-bottom: 5px; font-size: 0.85em; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .val-tag { float: right; color: #00796b; font-weight: bold; }
        .result-panel { grid-column: span 2; text-align: center; margin-top: 10px; padding: 15px; background: #263238; color: white; border-radius: 10px; }
        .final-sum { font-size: 1.4em; color: #4db6ac; font-weight: bold; }
        .strategy-box { margin-top: 20px; border-left: 5px solid #00796b; background: #f1f8f7; padding: 15px; border-radius: 5px; min-height: 80px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 ETF 投資模擬器</h1>
        <div class="main-layout">
            <div class="controls">
                <div class="control-item"><label>本金 (NT$): <span id="v1" class="val-tag"></span></label><input type="range" id="initSum" min="0" max="1000000" step="10000" value="100000"></div>
                <div class="control-item"><label>每月投入 (NT$): <span id="v2" class="val-tag"></span></label><input type="range" id="monthly" min="0" max="100000" step="1000" value="3000"></div>
                <div class="control-item"><label>預期報酬 (%): <span id="v3" class="val-tag"></span></label><input type="range" id="rate" min="1" max="15" step="0.5" value="5"></div>
                <div class="control-item"><label>投資年限 (年): <span id="v4" class="val-tag"></span></label><input type="range" id="years" min="1" max="40" step="1" value="5"></div>
                <div class="control-item" style="background: #fff3e0;"><label>內扣費用 (%): <span id="v5" class="val-tag"></span></label><input type="range" id="cost" min="0" max="2.5" step="0.05" value="0.5"></div>
                <div class="control-item" style="background: #fff3e0;"><label>通貨膨脹 (%): <span id="v6" class="val-tag"></span></label><input type="range" id="inflation" min="0" max="5" step="0.1" value="2"></div>
                <div class="result-panel">
                    帳面總資產：<span id="finalTotal" class="final-sum"></span><br>
                    <small>實質購買力：<span id="realPower" style="color:#ffab91"></span></small>
                </div>
            </div>
            <div class="chart-container"><canvas id="myChart"></canvas></div>
        </div>
        <div class="strategy-box" id="insight"></div>
    </div>

    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        let myChart;

    window.onload = function() {
        function update() {
            const initSum = parseInt(document.getElementById('initSum').value);
            const monthly = parseInt(document.getElementById('monthly').value);
            const rawRate = parseFloat(document.getElementById('rate').value);
            const rawCost = parseFloat(document.getElementById('cost').value);
            const rawInf = parseFloat(document.getElementById('inflation').value);
            const years = parseInt(document.getElementById('years').value);
            
            const netRate = (rawRate - rawCost) / 100 / 12;
            const infRate = rawInf / 100 / 12;

            document.getElementById('v1').innerText = initSum.toLocaleString();
            document.getElementById('v2').innerText = monthly.toLocaleString();
            document.getElementById('v3').innerText = rawRate + '%';
            document.getElementById('v4').innerText = years;
            document.getElementById('v5').innerText = rawCost + '%';
            document.getElementById('v6').innerText = rawInf + '%';

            let nominalData = [];
            let realData = [];
            let labels = [];
            let currentNominal = initSum;

            for (let i = 0; i <= years; i++) {
                labels.push('第' + i + '年');
                nominalData.push(Math.round(currentNominal));
                realData.push(Math.round(currentNominal / Math.pow(1 + rawInf/100, i)));
                for (let m = 0; m < 12; m++) {
                    currentNominal = (currentNominal + monthly) * (1 + netRate);
                }
            }

            document.getElementById('finalTotal').innerText = 'NT$ ' + nominalData[nominalData.length-1].toLocaleString();
            document.getElementById('realPower').innerText = 'NT$ ' + realData[realData.length-1].toLocaleString();

            // --- 細緻化導讀邏輯 ---
            let insight = "<b>[策略診斷報告]</b><br>";
            const realReturn = rawRate - rawCost - rawInf;

            if (rawCost > 1.2) insight += "❌ <b>費用黑洞：</b>您的內扣費用過高，將吞噬約 1/4 的潛在財富。<br>";
            else if (rawCost < 0.4) insight += "✅ <b>低摩擦運行：</b>費用極低，複利引擎運作效率極高。<br>";

            if (realReturn <= 0) insight += "⚠️ <b>購買力警報：</b>報酬率跑輸通膨與成本，您的錢正在悄悄縮水！<br>";
            else if (realReturn < 3) insight += "💡 <b>增長遲緩：</b>實質增長僅 " + realReturn.toFixed(1) + "%，需增加本金或優化標的。<br>";

            if (years < 15) insight += "⏳ <b>時間維度短：</b>目前資產增長主要靠『存錢』而非『複利』。<br>";
            else insight += "🎯 <b>時間紅利：</b>長期持有讓複利斜率明顯上揚，成功的機率極高。";

            document.getElementById('insight').innerHTML = insight;

            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '帳面金額', data: nominalData, borderColor: '#00796b', fill: false, tension: 0.2 },
                        { label: '實質購買力', data: realData, borderColor: '#ff8a65', borderDash: [5, 5], fill: false, tension: 0.2 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        document.querySelectorAll('input').forEach(i => i.addEventListener('input', update));
        update();
    };
    </script>
</body>
</html>
